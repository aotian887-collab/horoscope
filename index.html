<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神算子 · 今日运势</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#0f0c29 0%,#1a1a3e 40%,#24243e 100%);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  display:flex;justify-content:center;align-items:flex-start;
  padding:24px 16px 50px;overflow-x:hidden;overflow-y:auto;
}
.stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2;transform:scale(1)}100%{opacity:1;transform:scale(1.6)}}

.card{
  position:relative;z-index:1;
  background:rgba(255,255,255,.06);backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:24px;
  padding:26px 18px 24px;width:100%;max-width:420px;
  text-align:center;animation:cardIn .7s cubic-bezier(.22,1,.36,1);
}
@keyframes cardIn{0%{opacity:0;transform:translateY(30px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}

.title{font-size:22px;font-weight:700;color:#e8d5f5;margin-bottom:2px}
.title .sub{font-size:10px;color:rgba(255,255,255,.25);font-weight:400;margin-left:4px}
.date-text{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-bottom:16px}
.nongli-text{font-size:10px;color:rgba(255,255,255,.2);margin-bottom:14px}

/* Tabs */
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:14px;padding:4px;margin-bottom:18px;overflow-x:auto;touch-action:manipulation}
.tab{flex-shrink:0;min-width:44px;border:none;border-radius:11px;padding:6px 7px;background:transparent;color:rgba(255,255,255,.35);font-size:10px;cursor:pointer;transition:all .25s;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab.active{background:rgba(168,130,220,.3);color:#e8d5f5;font-weight:600}
.tab-icon{font-size:16px;display:block;margin-bottom:1px}

.panel{display:none;animation:fadeUp .4s ease}
.panel.active{display:block}
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

/* 公用卡片 */
.fcard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 16px}
.big-emoji{font-size:32px;display:block;margin-bottom:4px}
.empty-state{padding:30px 0;color:rgba(255,255,255,.2);font-size:13px}

/* 选择网格 */
.sel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px}
.sel-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 4px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;transition:all .25s;font-family:inherit;line-height:1.4;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sel-btn:active{transform:scale(.95)}
.sel-btn.on{background:linear-gradient(135deg,rgba(168,130,220,.35),rgba(140,100,200,.25));border-color:rgba(180,150,220,.5);color:#e8d5f5}
.sel-btn .emoji{font-size:20px;display:block;margin-bottom:1px}
.sel-btn .name{font-size:10px}

/* 星级 */
.stars{font-size:22px;letter-spacing:3px;color:#f0d060;margin-bottom:8px}
.stars .dim,.fs .dim{opacity:.12}

/* 运势分项 */
.fitems{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.fi{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 6px}
.fi .fl{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:3px}
.fi .fs{font-size:13px;color:#f0d060;letter-spacing:2px}

/* 幸运行 */
.lucky-row{display:flex;justify-content:center;gap:16px;margin-bottom:10px}
.lucky-item{text-align:center}
.lucky-item .ll{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:2px}
.lucky-item .lv{font-size:14px;color:#d0c0f0;font-weight:600}

.ftxt{font-size:13px;color:rgba(255,255,255,.55);line-height:1.75;text-align:left;padding:0 2px}

/* 塔罗 */
.tarot-area{position:relative;perspective:600px}
.tarot-card-back{
  width:120px;height:170px;margin:0 auto 16px;
  background:linear-gradient(135deg,#2a1a4e,#3d2870);
  border:2px solid rgba(180,150,220,.4);border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;color:rgba(255,255,255,.5);
  transition:all .3s;position:relative;overflow:hidden;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transform-style:preserve-3d;
}
.tarot-card-back:active{border-color:rgba(200,170,240,.7);box-shadow:0 0 30px rgba(150,100,220,.3)}
.tarot-card-back .hint{font-size:12px;color:rgba(255,255,255,.4);position:absolute;bottom:14px}
.tarot-card-back.flipped{animation:flipCard .8s ease}
@keyframes flipCard{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.tarot-card-emoji{font-size:50px;margin-bottom:8px}
.tarot-card-name{font-size:18px;color:#e8d5f5;font-weight:700;margin-bottom:4px}
.tarot-position{display:inline-block;font-size:12px;border-radius:99px;padding:3px 14px;margin-bottom:12px;font-weight:600}
.tarot-position.upright{background:rgba(140,220,140,.2);color:#a0e8a0;border:1px solid rgba(140,220,140,.3)}
.tarot-position.reversed{background:rgba(220,140,140,.2);color:#e8a0a0;border:1px solid rgba(220,140,140,.3)}
.tarot-meaning{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;text-align:left}
.tarot-tip{margin-top:10px;font-size:11px;color:rgba(255,255,255,.25)}
.retry-btn{margin-top:14px;border:1px solid rgba(255,255,255,.2);background:transparent;border-radius:99px;padding:7px 22px;color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;font-family:inherit}
.retry-btn:active{background:rgba(255,255,255,.05)}

/* 签文 */
.qian-tube{
  width:80px;height:140px;margin:0 auto 16px;
  background:linear-gradient(180deg,#5c3a2e,#3d2218);
  border-radius:12px 12px 6px 6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;
  border:2px solid rgba(180,140,100,.4);
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.qian-tube:active{border-color:rgba(220,180,140,.7);box-shadow:0 0 30px rgba(180,120,60,.3)}
.qian-tube .hint{font-size:11px;color:rgba(255,255,255,.35);position:absolute;bottom:10px}
.qian-tube.shaking{animation:shake .5s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-3deg)}40%{transform:translateX(6px) rotate(3deg)}60%{transform:translateX(-4px) rotate(-2deg)}80%{transform:translateX(4px) rotate(2deg)}}
.qian-level{display:inline-block;font-size:20px;font-weight:700;padding:4px 20px;border-radius:99px;margin-bottom:10px}
.qian-level.shangshang{background:rgba(220,180,60,.2);color:#f0d060;border:1px solid rgba(220,180,60,.3)}
.qian-level.shang{background:rgba(140,200,140,.2);color:#a0e0a0;border:1px solid rgba(140,200,140,.3)}
.qian-level.zhong{background:rgba(160,180,220,.2);color:#b0c0e0;border:1px solid rgba(160,180,220,.3)}
.qian-level.xia{background:rgba(220,140,140,.2);color:#e0a0a0;border:1px solid rgba(220,140,140,.3)}
.qian-verse{font-size:15px;color:#e8d5f5;line-height:1.8;margin-bottom:12px;font-style:italic;letter-spacing:1px}
.qian-interpret{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;text-align:left}

/* 宜忌 */
.yiji-level{display:inline-block;font-size:28px;font-weight:800;padding:6px 28px;border-radius:99px;margin-bottom:14px}
.yiji-level.ji{background:rgba(220,180,60,.2);color:#f0d060;border:1px solid rgba(220,180,60,.3)}
.yiji-level.zhong{background:rgba(160,180,220,.2);color:#b0c0e0;border:1px solid rgba(220,180,60,.3)}
.yiji-level.xiong{background:rgba(220,140,140,.2);color:#e0a0a0;border:1px solid rgba(220,140,140,.3)}
.yiji-section{margin-bottom:14px;text-align:left}
.yiji-section .yiji-title{font-size:13px;font-weight:700;margin-bottom:6px}
.yiji-tags{display:flex;flex-wrap:wrap;gap:6px}
.yiji-tag{padding:4px 12px;border-radius:99px;font-size:11px}
.yiji-tag.yi{background:rgba(140,220,140,.12);color:#a0e8a0;border:1px solid rgba(140,220,140,.2)}
.yiji-tag.ji{background:rgba(220,140,140,.12);color:#e0a0a0;border:1px solid rgba(220,140,140,.2)}
.yiji-summary{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;text-align:left;margin-top:4px}

/* 方位 */
.dir-compass{position:relative;width:150px;height:150px;margin:0 auto 16px;border-radius:50%;border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.dir-center{text-align:center}
.dir-label{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:2px}
.dir-arrow{font-size:32px;color:#f0d060}
.dir-name{font-size:16px;color:#e8d5f5;font-weight:700}
.dir-hour{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}

/* MBTI */
.mbti-type-badge{display:inline-block;font-size:16px;font-weight:700;background:rgba(168,130,220,.25);color:#d0c0f0;border-radius:99px;padding:4px 18px;margin-bottom:10px}
.mbti-trait{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:12px}
.mbti-advice{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;text-align:left}

.footer{margin-top:16px;font-size:10px;color:rgba(255,255,255,.1);letter-spacing:1px}
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="card">
  <div class="title">🔮 神算子<span class="sub">今日运势</span></div>
  <div class="date-text" id="dateText"></div>
  <div class="nongli-text" id="nongliText"></div>

  <div class="tabs">
    <button class="tab active" data-tab="zodiac"><span class="tab-icon">✨</span>星座</button>
    <button class="tab" data-tab="shengxiao"><span class="tab-icon">🐉</span>生肖</button>
    <button class="tab" data-tab="tarot"><span class="tab-icon">🃏</span>塔罗</button>
    <button class="tab" data-tab="qian"><span class="tab-icon">🥢</span>签文</button>
    <button class="tab" data-tab="mbti"><span class="tab-icon">🧠</span>MBTI</button>
    <button class="tab" data-tab="yiji"><span class="tab-icon">📋</span>宜忌</button>
    <button class="tab" data-tab="fangwei"><span class="tab-icon">🧭</span>方位</button>
  </div>

  <!-- 星座 -->
  <div class="panel active" id="panelZodiac">
    <div class="sel-grid" id="signGrid"></div>
    <div id="zodiacResult"><div class="empty-state">👆 选择星座查看运势</div></div>
  </div>

  <!-- 生肖 -->
  <div class="panel" id="panelShengxiao">
    <div class="sel-grid" id="sxGrid"></div>
    <div id="sxResult"><div class="empty-state">👆 选择生肖查看运势</div></div>
  </div>

  <!-- 塔罗 -->
  <div class="panel" id="panelTarot">
    <div class="tarot-area">
      <div class="tarot-card-back" id="tarotCard" onclick="drawTarotCard()"><span>🔮</span><span class="hint">点击翻牌</span></div>
      <div id="tarotResult"></div>
    </div>
  </div>

  <!-- 签文 -->
  <div class="panel" id="panelQian">
    <div class="qian-tube" id="qianTube" onclick="drawQian()"><span>🥢</span><span class="hint">摇一签</span></div>
    <div id="qianResult"></div>
  </div>

  <!-- MBTI -->
  <div class="panel" id="panelMbti">
    <div class="sel-grid" id="mbtiGrid"></div>
    <div id="mbtiResult"><div class="empty-state">👆 选择 MBTI 类型</div></div>
  </div>

  <!-- 宜忌 -->
  <div class="panel" id="panelYiji">
    <div id="yijiResult"></div>
  </div>

  <!-- 方位 -->
  <div class="panel" id="panelFangwei">
    <div id="fwResult"></div>
  </div>

  <div class="footer">— 心诚则灵 好心情最重要 —</div>
</div>

<script>
// ============ 工具 ============
function seedRandom(seed){let s=seed;return function(){s=(s*16807+13)%2147483647;return(s-1)/2147483646}}
function dateSeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function starsHTML(r){let h='';for(let i=0;i<5;i++)h+=i<r?'★':'<span class="dim">★</span>';return h}

// ============ Tab ============
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-tab="'+name+'"]').classList.add('active');
  document.getElementById('panel'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
}
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',function(){switchTab(this.dataset.tab)})});

// ============ 农历 ============
function getNongliStr(){
  const now=new Date();
  const lunarMonths=['正','二','三','四','五','六','七','八','九','十','冬','腊'];
  const lunarDays=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  const tiangans=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const dizhis=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const shenxiao=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
  const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate();
  const tg=tiangans[(y-4)%10],dz=dizhis[(y-4)%12],sx=shenxiao[(y-4)%12];
  return `农历 ${tg}${dz}${sx}年 · ${lunarMonths[m-1]}月${lunarDays[d-1]}`;
}

// ============ 1. 星座 ============
const signs=[
  {name:'白羊座',emoji:'♈',ele:'火'},
  {name:'金牛座',emoji:'♉',ele:'土'},
  {name:'双子座',emoji:'♊',ele:'风'},
  {name:'巨蟹座',emoji:'♋',ele:'水'},
  {name:'狮子座',emoji:'♌',ele:'火'},
  {name:'处女座',emoji:'♍',ele:'土'},
  {name:'天秤座',emoji:'♎',ele:'风'},
  {name:'天蝎座',emoji:'♏',ele:'水'},
  {name:'射手座',emoji:'♐',ele:'火'},
  {name:'摩羯座',emoji:'♑',ele:'土'},
  {name:'水瓶座',emoji:'♒',ele:'风'},
  {name:'双鱼座',emoji:'♓',ele:'水'},
];
function renderSignGrid(){
  const g=document.getElementById('signGrid');g.innerHTML='';
  signs.forEach((s,i)=>{
    const b=document.createElement('button');b.className='sel-btn';
    b.innerHTML=`<span class="emoji">${s.emoji}</span><span class="name">${s.name}</span>`;
    b.onclick=function(){document.querySelectorAll('#signGrid .sel-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');showFortune(i)};
    g.appendChild(b);
  });
}
function showFortune(i){
  const s=signs[i],rng=seedRandom(dateSeed()*100+i);
  const o=Math.floor(rng()*3)+3,l=Math.floor(rng()*4)+1,c=Math.floor(rng()*4)+1,h=Math.floor(rng()*4)+2;
  const ln=Math.floor(rng()*99)+1;
  const cls=['薰衣草紫','雾霾蓝','珊瑚粉','薄荷绿','奶油黄','天空蓝','暖橘色','月白色','玫瑰金','浅灰','嫩绿','淡紫'];
  const cds=['#b8a0d8','#8ba4c9','#e8a0b0','#a0c8b8','#e8d8a0','#a0c0e8','#e8b888','#d8d8e8','#d8b0c0','#c0c0c8','#b8d8a8','#c8b8d8'];
  const ci=Math.floor(rng()*cls.length);
  const ot=['整体运势不错，适合做重要决定。直觉会比较准。','有点小波折，但总体向好。保持耐心。','运势平稳，按部就班做好手头的事。','运势走高！今天容易遇到好事。','运势一般，适当放慢节奏，别太累。','充满机会的一天，保持开放的心态。','情绪可能波动，傍晚后会慢慢好转。','运势不错，适合社交和沟通。'];
  const lt=['感情平平，单身的还需要一点时间。','容易和喜欢的人产生共鸣。','有伴的适合一起做点小事。','单身桃花运不错。','感情有小波动，冷静沟通就好。','今天适合表达心意。','感情稳中有升，珍惜眼前人。','容易被温柔打动。'];
  const ct=['工作效率不错，适合处理积压任务。','可能遇到挑战，但能处理好。','适合和同事合作。','工作上可能有意外的收获。','不适合做大决定，先观察。','事业运势上升，努力会被看见。','可能有新机会出现。','职场氛围不错。'];
  const ht=['身体状态良好，保持规律作息。','注意肩颈腰背，多起来活动。','精力不错，适合运动一下。','有点疲劳，多喝水早休息。','适合清淡饮食，肠胃别太累。','身心状态在线，继续保持。','注意用眼卫生，少看手机。','适合出门走走呼吸新鲜空气。'];
  document.getElementById('zodiacResult').innerHTML=`
    <div class="fcard">
      <div><span class="big-emoji">${s.emoji}</span>${s.name} · ${s.ele}象星座</div>
      <div class="stars">${starsHTML(o)}</div>
      <div class="fitems">
        <div class="fi"><div class="fl">💕 爱情</div><div class="fs">${starsHTML(l)}</div></div>
        <div class="fi"><div class="fl">💼 事业</div><div class="fs">${starsHTML(c)}</div></div>
        <div class="fi"><div class="fl">🏃 健康</div><div class="fs">${starsHTML(h)}</div></div>
      </div>
      <div class="lucky-row">
        <div class="lucky-item"><div class="ll">幸运数字</div><div class="lv">${ln}</div></div>
        <div class="lucky-item"><div class="ll">幸运颜色</div><div class="lv" style="color:${cds[ci]}">● ${cls[ci]}</div></div>
      </div>
      <div class="ftxt">
        ✨ ${ot[Math.floor(rng()*ot.length)]}<br><br>
        <span style="color:rgba(255,255,255,.35)">💕</span> ${lt[Math.floor(rng()*lt.length)]}<br>
        <span style="color:rgba(255,255,255,.35)">💼</span> ${ct[Math.floor(rng()*ct.length)]}<br>
        <span style="color:rgba(255,255,255,.35)">🏃</span> ${ht[Math.floor(rng()*ht.length)]}
      </div>
    </div>`;
}

// ============ 2. 生肖 ============
const shengxiao=[
  {name:'鼠',emoji:'🐭',wx:'水',he:'🐮🐉🐒',chong:'🐴'},
  {name:'牛',emoji:'🐮',wx:'土',he:'🐭🐍🐔',chong:'🐏'},
  {name:'虎',emoji:'🐯',wx:'木',he:'🐴🐶🐷',chong:'🐒'},
  {name:'兔',emoji:'🐰',wx:'木',he:'🐏🐶🐷',chong:'🐔'},
  {name:'龙',emoji:'🐲',wx:'土',he:'🐭🐒🐔',chong:'🐶'},
  {name:'蛇',emoji:'🐍',wx:'火',he:'🐮🐔🐒',chong:'🐷'},
  {name:'马',emoji:'🐴',wx:'火',he:'🐯🐏🐶',chong:'🐭'},
  {name:'羊',emoji:'🐑',wx:'土',he:'🐰🐴🐷',chong:'🐮'},
  {name:'猴',emoji:'🐵',wx:'金',he:'🐭🐲🐍',chong:'🐯'},
  {name:'鸡',emoji:'🐔',wx:'金',he:'🐮🐲🐍',chong:'🐰'},
  {name:'狗',emoji:'🐶',wx:'土',he:'🐯🐴🐰',chong:'🐲'},
  {name:'猪',emoji:'🐷',wx:'水',he:'🐰🐏🐯',chong:'🐍'},
];
function renderSxGrid(){

  renderSignGrid();

}
