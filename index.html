<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日运势 ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 50px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite alternate; }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.6); }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 26px 20px 24px;
      width: 100%; max-width: 400px;
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .title {
      font-size: 20px; font-weight: 700;
      color: #e8d5f5; margin-bottom: 2px;
    }
    .date-text {
      font-size: 12px; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; margin-bottom: 18px;
    }

    /* ===== Tabs ===== */
    .tabs {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 14px; padding: 4px;
      margin-bottom: 20px; overflow-x: auto;
    }
    .tab {
      flex: 1; min-width: 60px;
      border: none; border-radius: 11px;
      padding: 8px 6px;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 12px; cursor: pointer;
      transition: all 0.25s; font-family: inherit;
      white-space: nowrap;
    }
    .tab.active {
      background: rgba(168,130,220,0.3);
      color: #e8d5f5; font-weight: 600;
    }
    .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

    /* ===== 内容面板 ===== */
    .panel { display: none; animation: fadeUp 0.4s ease; }
    .panel.active { display: block; }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================
       星座运势 (复用现有样式)
       ============================ */
    .sign-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px;
    }
    .sign-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 10px 4px;
      color: rgba(255,255,255,0.6); font-size: 11px;
      cursor: pointer; transition: all 0.25s; font-family: inherit; line-height: 1.4;
    }
    .sign-btn:active { transform: scale(0.95); }
    .sign-btn.selected {
      background: linear-gradient(135deg, rgba(168,130,220,0.35), rgba(140,100,200,0.25));
      border-color: rgba(180,150,220,0.5); color: #e8d5f5;
    }
    .sign-btn .emoji { font-size: 20px; display: block; margin-bottom: 1px; }
    .sign-btn .name { font-size: 10px; }

    .fortune-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px;
    }
    .big-emoji { font-size: 32px; display: block; margin-bottom: 4px; }
    .overall-stars { font-size: 22px; letter-spacing: 3px; color: #f0d060; margin-bottom: 10px; }
    .overall-stars .dim, .stars .dim { opacity: 0.15; }
    .fortune-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .fi { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 6px; }
    .fi .fl { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 3px; }
    .fi .fs { font-size: 13px; color: #f0d060; letter-spacing: 2px; }
    .lucky-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 10px; }
    .lucky-item { text-align: center; }
    .lucky-item .ll { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
    .lucky-item .lv { font-size: 14px; color: #d0c0f0; font-weight: 600; }
    .fortune-text { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; text-align: left; padding: 0 2px; }

    .empty-state { padding: 30px 0; color: rgba(255,255,255,0.25); font-size: 13px; }

    /* ============================
       塔罗牌
       ============================ */
    .tarot-area { position: relative; }
    .tarot-card-back {
      width: 120px; height: 170px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #2a1a4e, #3d2870);
      border: 2px solid rgba(180,150,220,0.4);
      border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: rgba(255,255,255,0.5);
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .tarot-card-back:hover, .tarot-card-back:active {
      border-color: rgba(200,170,240,0.7);
      box-shadow: 0 0 30px rgba(150,100,220,0.3);
    }
    .tarot-card-back .hint {
      font-size: 12px; color: rgba(255,255,255,0.4);
      position: absolute; bottom: 14px;
    }
    .tarot-card-back.flipped { animation: flipCard 0.8s ease; }
    @keyframes flipCard {
      0% { transform: rotateY(0); }
      50% { transform: rotateY(90deg); }
      100% { transform: rotateY(0); }
    }

    .tarot-result {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px;
    }
    .tarot-card-name {
      font-size: 18px; color: #e8d5f5; font-weight: 700; margin-bottom: 4px;
    }
    .tarot-card-emoji { font-size: 50px; margin-bottom: 8px; }
    .tarot-position {
      display: inline-block; font-size: 12px; border-radius: 99px;
      padding: 3px 14px; margin-bottom: 12px; font-weight: 600;
    }
    .tarot-position.upright {
      background: rgba(140,220,140,0.2); color: #a0e8a0; border: 1px solid rgba(140,220,140,0.3);
    }
    .tarot-position.reversed {
      background: rgba(220,140,140,0.2); color: #e8a0a0; border: 1px solid rgba(220,140,140,0.3);
    }
    .tarot-meaning {
      font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; text-align: left;
    }
    .tarot-tip {
      margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.3);
    }
    .tarot-retry {
      margin-top: 14px; border: 1px solid rgba(255,255,255,0.2);
      background: transparent; border-radius: 99px; padding: 7px 22px;
      color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .tarot-retry:active { background: rgba(255,255,255,0.05); }

    /* ============================
       签文
       ============================ */
    .qian-area { text-align: center; }
    .qian-tube {
      width: 80px; height: 140px; margin: 0 auto 16px;
      background: linear-gradient(180deg, #5c3a2e, #3d2218);
      border-radius: 12px 12px 6px 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; transition: all 0.3s; position: relative;
      border: 2px solid rgba(180,140,100,0.4);
    }
    .qian-tube:hover, .qian-tube:active {
      border-color: rgba(220,180,140,0.7);
      box-shadow: 0 0 30px rgba(180,120,60,0.3);
    }
    .qian-tube .hint {
      font-size: 11px; color: rgba(255,255,255,0.35);
      position: absolute; bottom: 10px;
    }
    .qian-tube.shaking { animation: shake 0.5s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px) rotate(-3deg); }
      40% { transform: translateX(6px) rotate(3deg); }
      60% { transform: translateX(-4px) rotate(-2deg); }
      80% { transform: translateX(4px) rotate(2deg); }
    }

    .qian-result {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px;
    }
    .qian-level {
      display: inline-block; font-size: 20px; font-weight: 700;
      padding: 4px 20px; border-radius: 99px; margin-bottom: 10px;
    }
    .qian-level.shangshang { background: rgba(220,180,60,0.2); color: #f0d060; border: 1px solid rgba(220,180,60,0.3); }
    .qian-level.shang { background: rgba(140,200,140,0.2); color: #a0e0a0; border: 1px solid rgba(140,200,140,0.3); }
    .qian-level.zhong { background: rgba(160,180,220,0.2); color: #b0c0e0; border: 1px solid rgba(160,180,220,0.3); }
    .qian-level.xia { background: rgba(220,140,140,0.2); color: #e0a0a0; border: 1px solid rgba(220,140,140,0.3); }
    .qian-verse {
      font-size: 15px; color: #e8d5f5; line-height: 1.8; margin-bottom: 12px;
      font-style: italic; letter-spacing: 1px;
    }
    .qian-interpret {
      font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; text-align: left;
    }
    .qian-retry {
      margin-top: 14px; border: 1px solid rgba(255,255,255,0.2);
      background: transparent; border-radius: 99px; padding: 7px 22px;
      color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; font-family: inherit;
    }

    /* ============================
       MBTI
       ============================ */
    .mbti-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
    }
    .mbti-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 10px 4px;
      color: rgba(255,255,255,0.55); font-size: 12px;
      cursor: pointer; transition: all 0.25s; font-family: inherit; font-weight: 600;
    }
    .mbti-btn:active { transform: scale(0.95); }
    .mbti-btn.selected {
      background: linear-gradient(135deg, rgba(168,130,220,0.35), rgba(140,100,200,0.25));
      border-color: rgba(180,150,220,0.5); color: #e8d5f5;
    }

    .mbti-result {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px;
    }
    .mbti-type-badge {
      display: inline-block; font-size: 16px; font-weight: 700;
      background: rgba(168,130,220,0.25); color: #d0c0f0;
      border-radius: 99px; padding: 4px 18px; margin-bottom: 10px;
    }
    .mbti-trait {
      font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 12px;
    }
    .mbti-advice {
      font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; text-align: left;
    }

    .footer {
      margin-top: 16px; font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="card">
  <div class="title">🔮 今日运势</div>
  <div class="date-text" id="dateText"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="zodiac"><span class="tab-icon">✨</span>星座</button>
    <button class="tab" data-tab="tarot"><span class="tab-icon">🃏</span>塔罗</button>
    <button class="tab" data-tab="qian"><span class="tab-icon">🥢</span>签文</button>
    <button class="tab" data-tab="mbti"><span class="tab-icon">🧠</span>MBTI</button>
  </div>

  <!-- ========== 星座 ========== -->
  <div class="panel active" id="panelZodiac">
    <div class="sign-grid" id="signGrid"></div>
    <div id="zodiacResult">
      <div class="empty-state">👆 选择一个星座查看今日运势</div>
    </div>
  </div>

  <!-- ========== 塔罗 ========== -->
  <div class="panel" id="panelTarot">
    <div class="tarot-area">
      <div class="tarot-card-back" id="tarotCard" onclick="drawTarotCard()">
        <span>🔮</span>
        <span class="hint">点击翻牌</span>
      </div>
      <div id="tarotResult"></div>
    </div>
  </div>

  <!-- ========== 签文 ========== -->
  <div class="panel" id="panelQian">
    <div class="qian-area">
      <div class="qian-tube" id="qianTube" onclick="drawQian()">
        <span>🥢</span>
        <span class="hint">摇一签</span>
      </div>
      <div id="qianResult"></div>
    </div>
  </div>

  <!-- ========== MBTI ========== -->
  <div class="panel" id="panelMbti">
    <div class="mbti-grid" id="mbtiGrid"></div>
    <div id="mbtiResult">
      <div class="empty-state">👆 选择你的 MBTI 类型</div>
    </div>
  </div>

  <div class="footer">— 运势仅供参考，好心情才是真的 —</div>
</div>

<script>
  // ================================
  // 工具函数
  // ================================
  function seedRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807 + 13) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }
  function dateSeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  function starsHTML(rating) {
    let html = '';
    for (let i = 0; i < 5; i++) html += i < rating ? '★' : '<span class="dim">★</span>';
    return html;
  }

  // ================================
  // Tab 切换
  // ================================
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="' + name + '"]').classList.add('active');
    document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() { switchTab(this.dataset.tab); });
  });

  // ================================
  // 1. 星座运势
  // ================================
  const signs = [
    { name: '白羊座', emoji: '♈', range: '3.21-4.19' },
    { name: '金牛座', emoji: '♉', range: '4.20-5.20' },
    { name: '双子座', emoji: '♊', range: '5.21-6.21' },
    { name: '巨蟹座', emoji: '♋', range: '6.22-7.22' },
    { name: '狮子座', emoji: '♌', range: '7.23-8.22' },
    { name: '处女座', emoji: '♍', range: '8.23-9.22' },
    { name: '天秤座', emoji: '♎', range: '9.23-10.23' },
    { name: '天蝎座', emoji: '♏', range: '10.24-11.22' },
    { name: '射手座', emoji: '♐', range: '11.23-12.21' },
    { name: '摩羯座', emoji: '♑', range: '12.22-1.19' },
    { name: '水瓶座', emoji: '♒', range: '1.20-2.18' },
    { name: '双鱼座', emoji: '♓', range: '2.19-3.20' },
  ];

  function renderSignGrid() {
    const grid = document.getElementById('signGrid');
    grid.innerHTML = '';
    signs.forEach((sign, idx) => {
      const btn = document.createElement('button');
      btn.className = 'sign-btn';
      btn.innerHTML = `<span class="emoji">${sign.emoji}</span><span class="name">${sign.name}</span>`;
      btn.onclick = function() {
        document.querySelectorAll('#signGrid .sign-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        showFortune(idx);
      };
      grid.appendChild(btn);
    });
  }

  function showFortune(idx) {
    const sign = signs[idx];
    const rng = seedRandom(dateSeed() * 100 + idx);
    const overall = Math.floor(rng() * 3) + 3;
    const love = Math.floor(rng() * 4) + 1;
    const career = Math.floor(rng() * 4) + 1;
    const health = Math.floor(rng() * 4) + 2;
    const luckyNum = Math.floor(rng() * 99) + 1;
    const colors = ['薰衣草紫','雾霾蓝','珊瑚粉','薄荷绿','奶油黄','天空蓝','暖橘色','月白色','玫瑰金','浅灰','嫩绿','淡紫'];
    const colorCodes = ['#b8a0d8','#8ba4c9','#e8a0b0','#a0c8b8','#e8d8a0','#a0c0e8','#e8b888','#d8d8e8','#d8b0c0','#c0c0c8','#b8d8a8','#c8b8d8'];
    const ci = Math.floor(rng() * colors.length);

    const overallTexts = ['整体运势不错，适合做重要决定。','有点小波折，但总体向好。','运势平稳，按部就班就好。','运势走高，容易遇到好事。','运势一般，适当放慢节奏。','充满机会的一天，保持开放心态。','情绪可能波动，傍晚后会好转。','运势不错，适合社交和沟通。'];
    const loveTexts = ['感情平平，单身的还需要一点时间。','容易和喜欢的人产生共鸣。','有伴的适合一起做点小事。','单身桃花运不错。','感情有小波动，冷静沟通。','今天适合表达心意。','感情稳中有升。','容易被温柔打动。'];
    const careerTexts = ['工作效率不错。','可能遇到挑战，但能处理好。','适合和同事合作。','工作上可能有意外的收获。','不适合做大决定，先观察。','事业运势上升。','可能有新机会出现。','职场氛围不错。'];
    const healthTexts = ['身体状态良好。','注意肩颈腰背，多活动。','精力不错，适合运动。','有点疲劳，多喝水早休息。','适合清淡饮食。','身心状态在线。','注意用眼卫生。','适合出门走走。'];

    document.getElementById('zodiacResult').innerHTML = `
      <div class="fortune-card">
        <div><span class="big-emoji">${sign.emoji}</span>${sign.name} · ${sign.range}</div>
        <div class="overall-stars">${starsHTML(overall)}</div>
        <div class="fortune-items">
          <div class="fi"><div class="fl">💕 爱情</div><div class="fs">${starsHTML(love)}</div></div>
          <div class="fi"><div class="fl">💼 事业</div><div class="fs">${starsHTML(career)}</div></div>
          <div class="fi"><div class="fl">🏃 健康</div><div class="fs">${starsHTML(health)}</div></div>
        </div>
        <div class="lucky-row">
          <div class="lucky-item"><div class="ll">幸运数字</div><div class="lv">${luckyNum}</div></div>
          <div class="lucky-item"><div class="ll">幸运颜色</div><div class="lv" style="color:${colorCodes[ci]}">● ${colors[ci]}</div></div>
        </div>
        <div class="fortune-text">
          ${overallTexts[Math.floor(rng()*8)]}<br><br>
          <span style="color:rgba(255,255,255,0.4)">💕</span> ${loveTexts[Math.floor(rng()*8)]}<br>
          <span style="color:rgba(255,255,255,0.4)">💼</span> ${careerTexts[Math.floor(rng()*8)]}<br>
          <span style="color:rgba(255,255,255,0.4)">🏃</span> ${healthTexts[Math.floor(rng()*8)]}
        </div>
      </div>`;
  }

  // ================================
  // 2. 塔罗牌
  // ================================
  const tarotCards = [
    { name: '愚者', emoji: '🤹', upright: '新的开始，勇敢迈出第一步。保持好奇心，冒险会带来收获。', reversed: '冲动可能带来风险，做事前多思考。今天不宜贸然行动。' },
    { name: '魔术师', emoji: '🧙', upright: '技能和资源都在你手中，今天适合创造和表达。', reversed: '可能感觉力不从心，检查一下是否准备好了再行动。' },
    { name: '女祭司', emoji: '🧘', upright: '相信直觉，今天内心会有答案。适合静下来倾听自己。', reversed: '可能被外界干扰，忽略了内心的声音。安静一会儿。' },
    { name: '皇后', emoji: '👸', upright: '丰收和温暖的一天，享受生活的小确幸，适合关怀自己。', reversed: '可能感觉自己付出太多，适当照顾自己的需求。' },
    { name: '皇帝', emoji: '👑', upright: '掌控力强的一天，适合做决策和建立秩序。', reversed: '控制欲可能过强，试着放手让事情自然发展。' },
    { name: '教皇', emoji: '⛪', upright: '适合学习和请教他人，今天容易获得有价值的建议。', reversed: '不要盲从权威，保持独立思考。' },

  function drawTarotCard() {
    const cardBack = document.getElementById('tarotCard');
    cardBack.classList.add('flipped');
    const rng = seedRandom(dateSeed() * 7 + 3);
    const idx = Math.floor(rng() * tarotCards.length);
    const isUpright = rng() > 0.5;
    const card = tarotCards[idx];
    const meaning = isUpright ? card.upright : card.reversed;
    const posClass = isUpright ? 'upright' : 'reversed';
    const posText = isUpright ? '正位 ↑' : '逆位 ↓';

    setTimeout(function() {
      document.getElementById('tarotCard').style.display = 'none';
      document.getElementById('tarotResult').innerHTML = `
        <div class="tarot-result">
          <div class="tarot-card-emoji">${card.emoji}</div>
          <div class="tarot-card-name">${card.name}</div>
          <div class="tarot-position ${posClass}">${posText}</div>
          <div class="tarot-meaning">${meaning}</div>
          <div class="tarot-tip">今天的指引：${isUpright ? '顺势而行' : '三思后行'}</div>
          <button class="tarot-retry" onclick="resetTarot()">再抽一张</button>
        </div>`;
    }, 600);
  }

  function resetTarot() {
    document.getElementById('tarotCard').style.display = 'flex';
    document.getElementById('tarotCard').classList.remove('flipped');
    document.getElementById('tarotResult').innerHTML = '';
  }

  function renderMbtiGrid() {
    const grid = document.getElementById('mbtiGrid');
    grid.innerHTML = '';
    mbtiTypes.forEach((m, idx) => {
      const btn = document.createElement('button');
      btn.className = 'mbti-btn';
      btn.textContent = m.type;
      btn.onclick = function() {
        document.querySelectorAll('#mbtiGrid .mbti-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        showMbti(idx);
      };
      grid.appendChild(btn);
    });
  }

  function showMbti(idx) {
    const m = mbtiTypes[idx];
    const rng = seedRandom(dateSeed() * 100 + idx * 3);
    const advice = mbtiAdvices[Math.floor(rng() * mbtiAdvices.length)];
    const extra = [
      '你今天的能量场比较强，适合主导局面。',
      '今天适合倾听多于表达，会学到东西。',
      '可以试着做一件一直想做但没做的事。',
      '今天的人际关系运势不错，多联系朋友。',

  // ================================

  function spawnStars() {
    const bg = document.getElementById('starsBg');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = 1 + Math.random() * 2.5;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.animationDuration = (1.5 + Math.random() * 3) + 's';
      star.style.animationDelay = Math.random() * 3 + 's';
      bg.appendChild(star);
    }
  }

  function init() {
    const now = new Date();
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    document.getElementById('dateText').textContent =

    renderSignGrid();
    renderMbtiGrid();
  }
